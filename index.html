<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Enigma Privé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #ffffff; }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: #ca8a04; 
            border-radius: 10px; 
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-[#0b1120] min-h-screen text-slate-300">

    <nav class="border-b border-slate-800 bg-[#0b1120]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <h1 class="text-3xl font-bold serif tracking-tight text-white">
                    Enigma <span class="text-yellow-600">Privé</span>
                    <span class="text-xs uppercase tracking-[0.2em] text-slate-500 ml-3 font-sans">Admin</span>
                </h1>
            </div>
            
            <div id="userInfo" class="hidden flex items-center gap-6">
                <span id="userEmail" class="text-sm font-light text-slate-400"></span>
                <button id="btnLogout" class="border border-yellow-600/30 text-yellow-600 hover:bg-yellow-600 hover:text-white px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest transition-all">
                    Sair
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-12">

        <div id="loginSection" class="max-w-md mx-auto glass-card rounded-3xl p-10 mt-10">
            <div class="text-center mb-10">
                <p class="text-yellow-600 text-xs font-bold uppercase tracking-[0.3em] mb-4">Acesso Administrativo</p>
                <h2 class="text-2xl font-semibold text-white">Identifique-se</h2>
            </div>
            
            <form id="loginForm" class="space-y-6">
                <div>
                    <input type="text" id="usuario" placeholder="USUÁRIO" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-4 px-5 text-sm focus:border-yellow-600 outline-none transition-all placeholder:text-slate-600">
                </div>
                <div>
                    <input type="password" id="password" placeholder="SENHA" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl py-4 px-5 text-sm focus:border-yellow-600 outline-none transition-all placeholder:text-slate-600">
                </div>
                <button type="submit" class="w-full py-4 rounded-full bg-transparent border border-yellow-600 text-yellow-600 hover:bg-yellow-600 hover:text-white font-bold text-xs uppercase tracking-widest transition-all">
                    Entrar no Sistema
                </button>
                <div id="loginError" class="hidden text-red-400 text-xs text-center mt-4 uppercase tracking-tighter">Credenciais Inválidas</div>
            </form>
        </div>

        <div id="adminSection" class="hidden space-y-8 animate-in fade-in duration-700">
            
            <div class="flex justify-start">
                <div class="glass-card px-8 py-4 rounded-2xl inline-flex items-center gap-4">
                    <span class="text-slate-500 text-xs font-bold uppercase tracking-widest">Total no Arquivo</span>
                    <span id="totalCharadas" class="text-2xl font-bold text-yellow-600 serif">0</span>
                </div>
            </div>

            <div class="flex flex-col lg:flex-row gap-10 h-[calc(100vh-320px)] min-h-[550px]">
                
                <div class="w-full lg:w-80 h-full">
                    <div class="glass-card rounded-[2rem] p-8 h-full flex flex-col relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-8 opacity-10">
                            <i class="fas fa-pen-nib text-4xl"></i>
                        </div>
                        
                        <h3 id="formTitle" class="text-xs font-bold text-yellow-600 uppercase tracking-[0.3em] mb-8">Novo Registro</h3>
                        
                        <form id="charadaForm" class="space-y-6 flex-1">
                            <input type="hidden" id="charadaId">
                            
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Enigma</label>
                                <textarea id="pergunta" rows="6" required class="w-full bg-[#0f172a] border border-slate-800 rounded-2xl py-4 px-5 text-sm focus:border-yellow-600 outline-none transition-all resize-none text-slate-300 italic" placeholder="Escreva o mistério..."></textarea>
                            </div>
                            
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Revelação</label>
                                <input type="text" id="resposta" required class="w-full bg-[#0f172a] border border-slate-800 rounded-2xl py-4 px-5 text-sm focus:border-yellow-600 outline-none transition-all text-yellow-600 font-semibold uppercase" placeholder="A resposta...">
                            </div>

                            <div class="flex flex-col gap-3 mt-auto pt-6">
                                <button type="submit" class="w-full py-4 rounded-full bg-yellow-600 text-white font-bold text-[10px] uppercase tracking-[0.2em] hover:bg-yellow-500 transition-all shadow-lg shadow-yellow-900/20">
                                    Salvar Enigma
                                </button>
                                <button type="button" id="btnCancelar" class="hidden w-full py-4 rounded-full border border-slate-700 text-slate-400 font-bold text-[10px] uppercase tracking-widest hover:bg-slate-800 transition-all">
                                    Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="flex-1 h-full">
                    <div class="glass-card rounded-[2rem] flex flex-col h-full overflow-hidden border border-yellow-600/10">
                        <div class="p-8 border-b border-slate-800/50 flex justify-between items-center">
                            <h3 class="serif text-2xl text-gray-300">Arquivo</h3>
                            <button onclick="carregarCharadas()" class="text-slate-500 hover:text-yellow-600 transition-colors">
                                <i class="fas fa-rotate text-sm"></i>
                            </button>
                        </div>
                        
                        <div class="flex-1 overflow-y-auto custom-scrollbar px-2">
                            <table class="w-full">
                                <thead class="sticky top-0 bg-[#161f31] z-10">
                                    <tr class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">
                                        <th class="px-8 py-4 text-left w-1/2">Pergunta</th>
                                        <th class="px-8 py-4 text-left">Resposta</th>
                                        <th class="px-8 py-4 text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaCharadas" class="divide-y divide-slate-800/50">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
